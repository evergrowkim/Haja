<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하자 이걸로 - 로그인</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-md);
      padding: 40px 32px;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 4px;
    }
    .login-brand .sub {
      font-size: 12px;
      color: var(--gray-500);
    }
    .login-divider {
      text-align: center;
      margin: 20px 0;
      position: relative;
    }
    .login-divider::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: var(--gray-200);
    }
    .login-divider span {
      background: #fff;
      padding: 0 12px;
      font-size: 11px;
      color: var(--gray-400);
      position: relative;
    }
    .login-footer {
      margin-top: 24px;
      text-align: center;
    }
    .login-footer a {
      font-size: 12px;
      color: var(--gray-500);
    }
    .login-info {
      margin-top: 24px;
      padding: 14px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--border-radius-sm);
      font-size: 11px;
      color: var(--gray-600);
      line-height: 1.6;
    }
    .login-info strong {
      color: var(--gray-700);
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .checkbox-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--gray-600);
      cursor: pointer;
    }
    .checkbox-row a {
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <h1>하자 이걸로</h1>
        <div class="sub">AI 기반 공동주택 하자관리 시스템</div>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input type="email" id="email" class="form-input" placeholder="name@company.com" value="admin@hansol.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input type="password" id="password" class="form-input" placeholder="비밀번호 입력" value="demo1234">
        </div>

        <div class="checkbox-row">
          <label>
            <input type="checkbox" checked> 로그인 상태 유지
          </label>
          <a href="#">비밀번호 찾기</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full" id="loginBtn">
          로그인
        </button>
      </form>

      <div class="login-divider">
        <span>또는</span>
      </div>

      <button class="btn btn-secondary btn-lg w-full" onclick="handleLogin(event)" style="margin-bottom: 8px;">
        SSO 로그인 (회사 계정)
      </button>

      <div class="login-info">
        <strong>Mockup 안내</strong><br>
        이 화면은 프로토타입입니다. 아무 값으로 로그인 버튼을 누르면 대시보드로 이동합니다.
        실제 구현 시 Laravel Sanctum + SSO 인증이 적용됩니다.
      </div>
    </div>

    <div class="login-footer">
      <a href="#">이용약관</a> &middot; <a href="#">개인정보처리방침</a> &middot; <a href="#">고객센터</a>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<span class="spinner"></span> 로그인 중...';
      btn.disabled = true;
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 800);
    }
  </script>
</body>
</html>
